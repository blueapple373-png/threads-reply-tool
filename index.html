<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>コメント返信ツール — MINAMI MINDLAB</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&family=Noto+Serif+JP:wght@300;400&display=swap');

  :root {
    --bg: #F7F5F2;
    --surface: #FFFFFF;
    --border: #E5E0D8;
    --text: #2A2520;
    --text-muted: #8A8078;
    --accent: #7C6A55;
    --accent-light: #EDE8E1;
    --tag-advice: #E8EFF5;
    --tag-advice-text: #3D6080;
    --tag-empathy: #F0EDF5;
    --tag-empathy-text: #5D4080;
    --tag-deep: #FBF0EE;
    --tag-deep-text: #80403A;
    --tag-promo: #F5F5F0;
    --tag-promo-text: #606055;
    --green: #4A7A5A;
    --green-light: #EBF3EE;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    padding: 0;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 24px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  header h1 {
    font-family: 'Noto Serif JP', serif;
    font-weight: 300;
    font-size: 16px;
    letter-spacing: 0.08em;
    color: var(--accent);
  }

  header p {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
    letter-spacing: 0.04em;
  }

  .main {
    max-width: 680px;
    margin: 0 auto;
    padding: 24px 16px 60px;
  }

  /* Input area */
  .input-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 24px;
  }

  .input-section label {
    display: block;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .post-input {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    font-weight: 300;
    color: var(--text);
    background: var(--bg);
    resize: vertical;
    min-height: 80px;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 14px;
  }

  .post-input:focus {
    border-color: var(--accent);
  }

  .comments-input {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    font-weight: 300;
    color: var(--text);
    background: var(--bg);
    resize: vertical;
    min-height: 140px;
    outline: none;
    transition: border-color 0.2s;
  }

  .comments-input:focus {
    border-color: var(--accent);
  }

  .input-hint {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 8px;
    line-height: 1.6;
  }

  .analyze-btn {
    width: 100%;
    margin-top: 16px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 14px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    font-weight: 400;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .analyze-btn:hover { opacity: 0.85; }
  .analyze-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Loading */
  .loading {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-muted);
    font-size: 13px;
    display: none;
  }

  .loading-dots span {
    display: inline-block;
    animation: blink 1.2s infinite;
    font-size: 20px;
    color: var(--accent);
  }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink {
    0%, 80%, 100% { opacity: 0.2; }
    40% { opacity: 1; }
  }

  /* Results */
  .results { display: none; }

  .results-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .results-title {
    font-family: 'Noto Serif JP', serif;
    font-size: 14px;
    font-weight: 400;
    color: var(--text-muted);
    letter-spacing: 0.06em;
  }

  .filter-tabs {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }

  .filter-tab {
    border: 1px solid var(--border);
    background: var(--surface);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 11px;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    color: var(--text-muted);
    transition: all 0.15s;
  }

  .filter-tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  /* Comment card */
  .comment-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
    margin-bottom: 12px;
    transition: border-color 0.2s;
  }

  .comment-card.needs-attention {
    border-left: 3px solid var(--tag-deep-text);
  }

  .comment-card.auto-ok {
    border-left: 3px solid var(--green);
  }

  .card-top {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 12px;
  }

  .tag {
    display: inline-block;
    border-radius: 4px;
    padding: 2px 8px;
    font-size: 10px;
    letter-spacing: 0.06em;
    white-space: nowrap;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .tag-advice { background: var(--tag-advice); color: var(--tag-advice-text); }
  .tag-empathy { background: var(--tag-empathy); color: var(--tag-empathy-text); }
  .tag-deep { background: var(--tag-deep); color: var(--tag-deep-text); }
  .tag-promo { background: var(--tag-promo); color: var(--tag-promo-text); }

  .comment-text {
    font-size: 13px;
    line-height: 1.75;
    color: var(--text);
    flex: 1;
  }

  .action-label {
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  .reply-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 13px;
    line-height: 1.75;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
  }

  .attention-notice {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--tag-deep);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12px;
    color: var(--tag-deep-text);
    line-height: 1.5;
  }

  .card-actions {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }

  .btn-copy {
    flex: 1;
    background: var(--green-light);
    color: var(--green);
    border: none;
    border-radius: 6px;
    padding: 9px 14px;
    font-size: 12px;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    transition: opacity 0.2s;
    letter-spacing: 0.04em;
  }

  .btn-copy:hover { opacity: 0.8; }

  .btn-skip {
    background: var(--bg);
    color: var(--text-muted);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 9px 14px;
    font-size: 12px;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .btn-skip:hover { opacity: 0.7; }

  .done-badge {
    font-size: 11px;
    color: var(--green);
    display: none;
    align-items: center;
    gap: 4px;
    margin-top: 8px;
  }

  .skipped .comment-text,
  .skipped .reply-box,
  .skipped .attention-notice {
    opacity: 0.4;
  }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-muted);
    font-size: 13px;
    display: none;
  }
</style>
</head>
<body>

<header>
  <h1>MINAMI MINDLAB — コメント返信ツール</h1>
  <p>コメントを分類して、返信案を生成します</p>
</header>

<div class="main">

  <div class="input-section">
    <label>元の投稿（任意）</label>
    <textarea class="post-input" id="postText" placeholder="例：愛着障害も調べた。自己否定も調べた。なのに苦しい。"></textarea>

    <label>コメントを貼り付け</label>
    <textarea class="comments-input" id="commentsText" placeholder="コメントを1件ずつ改行で区切って貼り付けてください。

例：
実践が必要ですよ。知識だけでは変わりません。
私も同じです。楽しいと思えた瞬間に怖くなる。
話しませんか？無料セッションやってます。"></textarea>
    <p class="input-hint">※ 複数のコメントは改行で区切ってください。ユーザー名は不要です。</p>

    <button class="analyze-btn" id="analyzeBtn" onclick="analyzeComments()">分類して返信案を作る</button>
  </div>

  <div class="loading" id="loading">
    <div class="loading-dots">
      <span>·</span><span>·</span><span>·</span>
    </div>
    <p style="margin-top:12px;">分析中です</p>
  </div>

  <div class="results" id="results">
    <div class="results-header">
      <span class="results-title" id="resultsTitle"></span>
    </div>

    <div class="filter-tabs" id="filterTabs">
      <button class="filter-tab active" onclick="filterCards('all')">すべて</button>
      <button class="filter-tab" onclick="filterCards('advice')">アドバイス型</button>
      <button class="filter-tab" onclick="filterCards('empathy')">共感型</button>
      <button class="filter-tab" onclick="filterCards('deep')">要対応</button>
      <button class="filter-tab" onclick="filterCards('promo')">勧誘型</button>
    </div>

    <div id="cardList"></div>
    <div class="empty" id="emptyState">該当するコメントはありません</div>
  </div>

</div>

<script>
let allCards = [];
let currentFilter = 'all';

async function analyzeComments() {
  const postText = document.getElementById('postText').value.trim();
  const commentsText = document.getElementById('commentsText').value.trim();

  if (!commentsText) {
    alert('コメントを入力してください');
    return;
  }

  const comments = commentsText.split('\n').map(c => c.trim()).filter(c => c.length > 0);
  if (comments.length === 0) {
    alert('コメントを入力してください');
    return;
  }

  document.getElementById('analyzeBtn').disabled = true;
  document.getElementById('loading').style.display = 'block';
  document.getElementById('results').style.display = 'none';

  const systemPrompt = `あなたはMINAMI MINDLABのコメント分類・返信生成AIです。

MINAMI MINDLABについて：
- 苦しみをなくすのではなく、苦しみの構造を研究して回復の地図を作る場所
- 「自分責めや不安をなくす方法ではなく、揺れても戻ってこられる方法」
- 運営者（南美）は「分かっているのに苦しい」体験を言葉にしている人

南美の返信スタイル：
- 短く、押しつけがましくない
- 相手の言葉をそのまま受け取る（解決しようとしない）
- 自分の体験を少し開示することがある
- 絵文字は😢🥲😂など感情に近いものを控えめに使う
- アドバイスをしない、寄り添う

分類ルール：
- advice：行動提案・知識提供・「実践が必要」「ワークしてる？」「改善策を」系
- empathy：「私も同じ」「分かる」「まさに今この状態」系の共感
- deep：重い体験（DV・自傷・自殺・虐待など）、強い感情的苦しさを開示しているコメント
- promo：「話しませんか」「無料セッション」「無料シート」など勧誘・営業

返信方針：
- advice → 感謝しつつ、南美らしい短い返信案を生成（自動化OK）
- empathy → 共鳴する短い返信案を生成（自動化OK）
- deep → 返信案は生成しない。「南美さんが自分で返信してください」とだけ伝える
- promo → 短いお礼だけの返信案を生成（または無視でもいいと伝える）

必ずJSON配列で返答してください。以下の形式で：
[
  {
    "comment": "元のコメントテキスト",
    "type": "advice" | "empathy" | "deep" | "promo",
    "reply": "返信案のテキスト（deepの場合はnull）",
    "note": "一言メモ（任意、deepの場合は理由）"
  }
]

JSONのみ返答。説明文・マークダウン記法・バッククォートは不要。`;

  const userPrompt = `${postText ? `元の投稿：\n${postText}\n\n` : ''}コメント一覧：
${comments.map((c, i) => `${i + 1}. ${c}`).join('\n')}

上記のコメントを分類して返信案を生成してください。`;

  try {
    try {
    const response = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer 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'
      },
      body: JSON.stringify({
        model: 'gpt-4o-mini',
        max_tokens: 1000,
        messages: [
          { role: 'system', content: systemPrompt },
          { role: 'user', content: userPrompt }
        ]
      })
    });

    const data = await response.json();
    const text = data.choices[0].message.content;
    const clean = text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);
  

    const data = await response.json();
    const text = data.content.map(i => i.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);

    allCards = parsed;
    renderCards(parsed);

  } catch (err) {
    console.error(err);
    alert('エラーが発生しました。もう一度試してください。');
  } finally {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('analyzeBtn').disabled = false;
  }
}

function renderCards(cards) {
  const list = document.getElementById('cardList');
  const results = document.getElementById('results');
  const title = document.getElementById('resultsTitle');

  list.innerHTML = '';

  const filtered = currentFilter === 'all' ? cards : cards.filter(c => c.type === currentFilter);

  title.textContent = `${cards.length}件のコメント`;

  if (filtered.length === 0) {
    document.getElementById('emptyState').style.display = 'block';
  } else {
    document.getElementById('emptyState').style.display = 'none';
  }

  filtered.forEach((item, idx) => {
    const card = document.createElement('div');
    card.className = `comment-card ${item.type === 'deep' ? 'needs-attention' : 'auto-ok'}`;
    card.id = `card-${idx}`;

    const tagLabel = { advice: 'アドバイス型', empathy: '共感型', deep: '要対応', promo: '勧誘型' }[item.type] || item.type;
    const tagClass = `tag-${item.type}`;

    let actionHTML = '';
    if (item.type === 'deep') {
      actionHTML = `
        <div class="attention-notice">
          <span>🌿</span>
          <span>このコメントは南美さんが直接返信してください。重い体験を話してくれています。</span>
        </div>`;
    } else {
      actionHTML = `
        <div class="action-label">返信案</div>
        <div class="reply-box" id="reply-${idx}">${escapeHtml(item.reply || '')}</div>
        <div class="card-actions">
          <button class="btn-copy" onclick="copyReply(${idx})">コピーする</button>
          <button class="btn-skip" onclick="skipCard(${idx})">スキップ</button>
        </div>
        <div class="done-badge" id="done-${idx}">✓ コピーしました</div>`;
    }

    card.innerHTML = `
      <div class="card-top">
        <span class="tag ${tagClass}">${tagLabel}</span>
        <div class="comment-text">${escapeHtml(item.comment)}</div>
      </div>
      ${actionHTML}`;

    list.appendChild(card);
  });

  results.style.display = 'block';
}

function filterCards(type) {
  currentFilter = type;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  renderCards(allCards);
}

function copyReply(idx) {
  const replyEl = document.getElementById(`reply-${idx}`);
  if (!replyEl) return;
  navigator.clipboard.writeText(replyEl.textContent).then(() => {
    const done = document.getElementById(`done-${idx}`);
    if (done) { done.style.display = 'flex'; setTimeout(() => done.style.display = 'none', 2000); }
  });
}

function skipCard(idx) {
  const card = document.getElementById(`card-${idx}`);
  if (card) card.classList.toggle('skipped');
}

function escapeHtml(text) {
  return (text || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
